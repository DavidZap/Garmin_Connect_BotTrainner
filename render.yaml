databases:
  - name: garmin-insights-db
    plan: free
    databaseName: garmin_insights
    user: garmin_insights

services:
  - type: web
    name: garmin-insights
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_api.py
    healthCheckPath: /health
    envVars:
      - key: APP_HOST
        value: 0.0.0.0
      - key: APP_PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: garmin-insights-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GARMIN_SOURCE
        value: node
      - key: GARMIN_USERNAME
        sync: false
      - key: GARMIN_PASSWORD
        sync: false
      - key: GARMIN_NODE_COMMAND
        value: node

  - type: cron
    name: garmin-insights-refresh
    runtime: python
    schedule: "0 10 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/daily_refresh.py --days 7 --source node
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: garmin-insights-db
          property: connectionString
      - key: GARMIN_SOURCE
        value: node
      - key: GARMIN_USERNAME
        sync: false
      - key: GARMIN_PASSWORD
        sync: false
      - key: GARMIN_NODE_COMMAND
        value: node
